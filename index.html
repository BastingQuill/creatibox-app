<title>CreatiBox — Precios</title>
<link rel="manifest" href="manifest.json">

<style>
:root{
  --crema:#F3EDE3; --tinta:#1B2432; --teal:#177E89; --teal-osc:#0F5A62;
  --coral:#E0533D; --amarillo:#F5B82E; --blanco:#FFFFFF;
  --gris:#8A8577; --linea:#DDD5C6; --ok:#2E7D32; --rojo:#C62828;
  --radius:16px; --sombra:0 2px 10px rgba(27,36,50,.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:'Poppins',sans-serif;background:var(--crema);color:var(--tinta);min-height:100vh;padding-bottom:96px}
.display{font-family:'Lobster Two',cursive;font-weight:700}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px 14px;border:1.5px solid var(--linea);border-radius:12px;background:var(--blanco);color:var(--tinta)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal)}
label{display:block;font-size:.82rem;font-weight:600;color:var(--gris);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.04em}
.oculto{display:none!important}

/* ===== Barra superior ===== */
.topbar{position:sticky;top:0;z-index:20;background:var(--teal);color:#fff;padding:14px 18px 12px;box-shadow:var(--sombra)}
.topbar .logo{font-size:1.7rem;letter-spacing:.01em}
.topbar .sub{font-size:.72rem;opacity:.85;margin-top:-4px}
.buscador{margin-top:10px;position:relative}
.buscador input{border:none;border-radius:999px;padding:12px 42px 12px 18px}
.buscador .lupa{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--gris);font-size:1.1rem}

/* ===== Chips de categorías ===== */
.chips{display:flex;gap:8px;overflow-x:auto;padding:14px 18px 6px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:8px 16px;border-radius:999px;background:var(--blanco);border:1.5px dashed var(--linea);font-size:.85rem;font-weight:600;color:var(--tinta);transition:all .15s}
.chip.activo{color:#fff;border-style:solid}

/* ===== Tarjetas (borde costura = firma visual) ===== */
.lista{padding:10px 18px;display:flex;flex-direction:column;gap:12px}
.seccion-titulo{font-size:1.25rem;color:var(--tinta);margin:10px 2px 2px;display:flex;align-items:center;gap:8px}
.seccion-titulo .punto{width:12px;height:12px;border-radius:50%}
.tarjeta{background:var(--blanco);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--sombra);border:2px dashed transparent;display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer;transition:transform .1s}
.tarjeta:active{transform:scale(.985)}
.tarjeta .nombre{font-weight:600;font-size:.98rem}
.tarjeta .tallas{font-size:.75rem;color:var(--gris);margin-top:2px}
.tarjeta .precios{text-align:right;flex-shrink:0}
.tarjeta .normal{font-weight:700;font-size:1.05rem}
.tarjeta .desde{font-size:.68rem;color:var(--gris);text-transform:uppercase;letter-spacing:.05em}
.tarjeta .mayoreo{font-size:.75rem;color:var(--teal);font-weight:600;margin-top:2px}
.vacio{text-align:center;color:var(--gris);padding:40px 20px;font-size:.9rem}

/* ===== Detalle ===== */
.detalle{padding:18px}
.volver{display:inline-flex;align-items:center;gap:6px;font-weight:600;color:var(--teal);font-size:.9rem;margin-bottom:12px}
.hero{background:var(--blanco);border-radius:var(--radius);padding:20px;box-shadow:var(--sombra);border:2px dashed var(--linea)}
.hero .cat-tag{display:inline-block;font-size:.7rem;font-weight:700;color:#fff;padding:4px 12px;border-radius:999px;text-transform:uppercase;letter-spacing:.05em}
.hero h1{font-size:1.5rem;margin:10px 0 2px}
.hero .tallas{font-size:.82rem;color:var(--gris)}
.precio-grande{display:flex;align-items:baseline;gap:8px;margin-top:14px}
.precio-grande .monto{font-size:2.2rem;font-weight:700;color:var(--coral)}
.precio-grande .mxn{font-size:.9rem;color:var(--gris);font-weight:600}
.fila-mayoreo{display:flex;gap:10px;margin-top:12px}
.caja-mayoreo{flex:1;background:var(--crema);border-radius:12px;padding:10px 12px;text-align:center}
.caja-mayoreo .etq{font-size:.68rem;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:.04em}
.caja-mayoreo .val{font-size:1.15rem;font-weight:700;color:var(--teal-osc);margin-top:2px}
.caja-mayoreo .aj{font-size:.62rem;color:var(--coral);font-weight:600}
.nota-caja{margin-top:12px;background:#FFF8E6;border:1.5px dashed var(--amarillo);border-radius:12px;padding:10px 14px;font-size:.8rem;color:#7A5B00}
.panel{background:var(--blanco);border-radius:var(--radius);padding:18px;box-shadow:var(--sombra);margin-top:14px}
.panel h2{font-size:1.15rem;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.desglose-fila{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--linea);font-size:.9rem}
.desglose-fila:last-child{border-bottom:none}
.desglose-fila.total{font-weight:700;border-top:2px solid var(--tinta);border-bottom:none;margin-top:4px;padding-top:10px}
.desglose-fila .v{font-weight:600}
.tag-iva{display:inline-block;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:999px;background:#E8F1EA;color:var(--ok);margin-top:8px}
.tag-iva.no{background:#F3F0EA;color:var(--gris)}
.extra-fila{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dashed var(--linea);font-size:.9rem}
.extra-fila:last-child{border-bottom:none}
.extra-fila .desc{font-size:.72rem;color:var(--gris);margin-top:2px;max-width:230px}
.botonera{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.btn{width:100%;padding:15px;border-radius:14px;font-size:1rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn-wa{background:#25D366;color:#fff}
.btn-sec{background:var(--blanco);color:var(--tinta);border:2px dashed var(--linea)}
.btn-teal{background:var(--teal);color:#fff}
.btn-coral{background:var(--coral);color:#fff}
.btn-peligro{background:none;color:var(--rojo);font-size:.85rem;padding:10px}

/* ===== Matriz calcomanías ===== */
.selector-med{display:flex;gap:10px}
.selector-med>div{flex:1}
.resultado-calc{margin-top:14px;background:var(--crema);border-radius:12px;padding:16px;text-align:center}
.resultado-calc .monto{font-size:1.8rem;font-weight:700;color:var(--coral)}
.resultado-calc .min{font-size:.75rem;color:var(--gris);margin-top:4px}

/* ===== Menú flotante ===== */
.fab{position:fixed;bottom:22px;right:18px;z-index:30;background:var(--coral);color:#fff;border-radius:999px;padding:16px 22px;font-size:1rem;font-weight:700;box-shadow:0 4px 16px rgba(224,83,61,.4);display:flex;align-items:center;gap:8px}
.hoja{position:fixed;inset:0;z-index:40;background:rgba(27,36,50,.45);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.hoja.abierta{opacity:1;pointer-events:auto}
.hoja-panel{background:var(--crema);width:100%;border-radius:24px 24px 0 0;padding:22px 18px 34px;transform:translateY(100%);transition:transform .25s}
.hoja.abierta .hoja-panel{transform:translateY(0)}
.hoja-panel h3{font-size:1.3rem;margin-bottom:14px}
.menu-item{display:flex;align-items:center;gap:14px;width:100%;background:var(--blanco);border-radius:14px;padding:16px;margin-bottom:10px;font-size:.95rem;font-weight:600;color:var(--tinta);text-align:left;border:2px dashed transparent}
.menu-item:active{border-color:var(--linea)}
.menu-item .ic{font-size:1.3rem}

/* ===== Login ===== */
.login{position:fixed;inset:0;z-index:100;background:var(--teal);display:flex;align-items:center;justify-content:center;padding:24px}
.login-caja{background:var(--crema);border-radius:20px;padding:30px 24px;width:100%;max-width:380px;border:3px dashed rgba(255,255,255,.5)}
.login-caja .logo{font-size:2.4rem;text-align:center;color:var(--teal)}
.login-caja .sub{text-align:center;font-size:.8rem;color:var(--gris);margin-bottom:10px}
.login-err{color:var(--rojo);font-size:.8rem;margin-top:10px;text-align:center;min-height:1em}

/* ===== Toast / cargando ===== */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--tinta);color:#fff;padding:12px 22px;border-radius:999px;font-size:.85rem;font-weight:600;opacity:0;transition:all .25s;z-index:60;pointer-events:none;white-space:nowrap}
.toast.ver{opacity:1;transform:translateX(-50%) translateY(0)}
.cargando{position:fixed;inset:0;z-index:90;background:var(--crema);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.aguja{width:44px;height:44px;border:4px dashed var(--teal);border-radius:50%;animation:girar 1.2s linear infinite}
@keyframes girar{to{transform:rotate(360deg)}}
.form-doble{display:flex;gap:10px}
.form-doble>div{flex:1}
.check-linea{display:flex;align-items:center;gap:10px;margin-top:14px;font-size:.9rem;font-weight:500}
.check-linea input{width:20px;height:20px;flex-shrink:0}
@media(min-width:700px){.contenedor{max-width:640px;margin:0 auto}}
</style>
</head>

<!-- Cargando -->
<div class="cargando" id="cargando"><div class="aguja"></div><div style="font-size:.85rem;color:var(--gris)">Hilando el catálogo…</div></div>

<!-- Login -->

  <div class="login-caja">
    <div class="logo display">CreatiBox</div>

    <div style="margin-top:18px"><button class="btn btn-teal" id="btnLogin">Entrar</button></div>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div class="contenedor">

<!-- Vista: Catálogo -->
<div id="vCatalogo">
  <div class="topbar">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><div class="logo display">CreatiBox</div><div class="sub">Catálogo y precios</div></div>
      <button id="btnSalir" style="color:#fff;opacity:.8;font-size:.75rem;font-weight:600">Salir</button>
    </div>
    <div class="buscador"><input type="search" id="txtBuscar" placeholder="Buscar producto… (ej. sudadera)"><span class="lupa">⌕</span></div>
  </div>
  <div class="chips" id="chips"></div>
  <div class="lista" id="lista"></div>
</div>

<!-- Vista: Detalle -->
<div id="vDetalle" class="oculto"><div class="detalle" id="detalleCont"></div></div>

<!-- Vista: Formulario producto -->
<div id="vFormProd" class="oculto"><div class="detalle" id="formProdCont"></div></div>

<!-- Vista: Materia prima -->
<div id="vMateria" class="oculto"><div class="detalle" id="materiaCont"></div></div>

<!-- Vista: Ajustes -->
<div id="vAjustes" class="oculto"><div class="detalle" id="ajustesCont"></div></div>

</div>

<!-- Botón flotante -->
<button class="fab" id="fab">＋ Menú</button>

<!-- Hoja de menú -->
<div class="hoja" id="hoja">
  <div class="hoja-panel">
    <h3 class="display">¿Qué quieres hacer?</h3>
    <button class="menu-item" data-accion="nuevoProducto"><span class="ic">📦</span> Agregar producto nuevo</button>
    <button class="menu-item" data-accion="materia"><span class="ic">🧵</span> Materia prima</button>
    <button class="menu-item" data-accion="excel"><span class="ic">⬇️</span> Descargar Excel (respaldo)</button>
    <button class="menu-item" data-accion="ajustes"><span class="ic">⚙️</span> Regla de mayoreo y ajustes</button>
    <button class="menu-item" data-accion="cerrar" style="background:none;justify-content:center;color:var(--gris)">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

/* ============ MAYOREO ============ */
function calcMayoreo(p){
  if(p.mayoreoExcluido || p.precio==null) return null;
  const tiers = (config.mayoreo||[]).slice().sort((a,b)=>a.min-b.min);
  return tiers.map(t=>{
    let pct = t.pct;
    if(p.mayoreoMax && pct > p.mayoreoMax) pct = p.mayoreoMax;
    let precio = Math.round(p.precio*(1-pct/100));
    let ajustado = false;
    if(p.costoTotal && precio < Math.ceil(p.costoTotal)){ precio = Math.ceil(p.costoTotal); ajustado = true; }
    if(precio >= p.precio) return {...t, precio:null};
    return {min:t.min, pct, precio, ajustado};
  }).filter(t=>t.precio!=null);
}

/* ============ CATÁLOGO ============ */
function renderChips(){
  const cont = $("chips"); cont.innerHTML = "";
  const todos = [{id:"todas",nombre:"Todos",color:"var(--tinta)"},...CATS];
  todos.forEach(c=>{
    const b = document.createElement("button");
    b.className = "chip"+(catActiva===c.id?" activo":"");
    b.textContent = c.nombre;
    if(catActiva===c.id){ b.style.background=c.color; b.style.borderColor=c.color; }
    b.onclick = ()=>{ catActiva=c.id; renderChips(); renderLista(); };
    cont.appendChild(b);
  });
}
function renderLista(){
  const cont = $("lista"); cont.innerHTML = "";
  const q = busqueda.trim().toLowerCase();
  let visibles = productos.filter(p=>
    (catActiva==="todas"||p.cat===catActiva) &&
    (!q || p.nombre.toLowerCase().includes(q) || catDe(p.cat).nombre.toLowerCase().includes(q)));
  if(!visibles.length){ cont.innerHTML = `<div class="vacio">No encontré nada con esa búsqueda.<br>Prueba con otra palabra 🧵</div>`; return; }
  const grupos = {};
  visibles.forEach(p=>{ (grupos[p.cat]=grupos[p.cat]||[]).push(p); });
  CATS.forEach(c=>{
    if(!grupos[c.id]) return;
    const h = document.createElement("div");
    h.className = "seccion-titulo display";
    h.innerHTML = `<span class="punto" style="background:${c.color}"></span>${c.nombre}`;
    cont.appendChild(h);
    grupos[c.id].forEach(p=>{
      const t = document.createElement("div");
      t.className = "tarjeta"; t.style.borderColor = c.color+"55";
      const may = calcMayoreo(p);
      const precioTxt = p.tipo==="matriz" ? `${fmt(12)}–${fmt(130)}` : p.precio==null ? "Cotizar" : fmt(p.precio);
      t.innerHTML = `<div><div class="nombre">${p.nombre}</div>${p.tallas?`<div class="tallas">${p.tallas}</div>`:""}</div>
        <div class="precios">${p.desde?`<div class="desde">desde</div>`:""}<div class="normal">${precioTxt}</div>
        ${may&&may.length?`<div class="mayoreo">${may[0].min}+ pzs: ${fmt(may[0].precio)}</div>`:""}</div>`;
      t.onclick = ()=>renderDetalle(p.id);
      cont.appendChild(t);
    });
  });
}

      <div><label>Escalón 2: desde (pzs)</label><input id="a2min" type="number" value="${m[1]?m[1].min:20}"></div>
      <div><label>Descuento %</label><input id="a2pct" type="number" value="${m[1]?m[1].pct:15}"></div>
    </div>
    <div class="nota-caja" style="margin-top:14px">🔒 Candado automático: el precio de mayoreo nunca baja del costo del producto. El Costal de Yute está excluido y las Camisas se limitan a −10%.</div>
    <h2 class="display" style="margin-top:20px">Cargos y mensaje</h2>
    <div class="form-doble">
      <div><label>Ponchado ($)</label><input id="aPonchado" type="number" value="${config.ponchado}"></div>
      <div><label>Bordado extra ($)</label><input id="aExtra" type="number" value="${config.extraBordado}"></div>
    </div>
    <label>Laminado stickers ($)</label><input id="aLam" type="number" value="${config.laminado}">
    <label>Saludo del mensaje de WhatsApp</label><textarea id="aMsj" rows="2">${config.msjWhats||""}</textarea>
    <div class="botonera"><button class="btn btn-teal" id="btnGuardarCfg">Guardar ajustes</button></div>
  </div>`;
  verVista("vAjustes");
  $("btnVolverA").onclick = ()=>verVista("vCatalogo");
  $("btnGuardarCfg").onclick = async ()=>{
    const nueva = { mayoreo:[{min:+$("a1min").value,pct:+$("a1pct").value},{min:+$("a2min").value,pct:+$("a2pct").value}],
      ponchado:+$("aPonchado").value, extraBordado:+$("aExtra").value, laminado:+$("aLam").value, msjWhats:$("aMsj").value.trim() };
    await setDoc(doc(db,"config","general"),nueva);
    toast("Ajustes guardados ⚙️"); verVista("vCatalogo");
  };
}

/* ============ EXPORTAR EXCEL ============ */
function exportarExcel(){
  const wb = XLSX.utils.book_new();
  const filasP = [["Producto","Categoría","Precio venta","Es 'desde'","Tallas","IVA prenda","Costo total","Margen %","Precio calculado","Mayoreo "+(config.mayoreo[0]?.min||10)+"+","Mayoreo "+(config.mayoreo[1]?.min||20)+"+","Notas"]];
  productos.forEach(p=>{
    const may = calcMayoreo(p)||[];
    filasP.push([p.nombre, catDe(p.cat).nombre, p.precio??"Cotizar", p.desde?"Sí":"", p.tallas||"", p.iva?"Sí":"No", p.costoTotal??"", p.margen??"", p.precioCalc??"", may[0]?.precio??(p.mayoreoExcluido?"Excluido":""), may[1]?.precio??"", p.notas||""]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(filasP), "Productos");
  const filasM = [["Material","Costo paquete","Rendimiento","Costo unitario","Notas"]];
  materia.forEach(m=>filasM.push([m.nombre,m.costoPaquete,m.rendimiento||"",m.costoUnitario,m.notas||""]));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(filasM), "Materia Prima");
  const filasC = [["Configuración","Valor"],["Mayoreo escalón 1",`${config.mayoreo[0].min}+ pzs = -${config.mayoreo[0].pct}%`],["Mayoreo escalón 2",`${config.mayoreo[1].min}+ pzs = -${config.mayoreo[1].pct}%`],["Ponchado",config.ponchado],["Bordado extra >10x10",config.extraBordado],["Laminado stickers",config.laminado]];
  const filasCal = [["Calcomanías (cm)",...MATRIZ_CALCO.medidas.map(m=>m+"cm")]];
  MATRIZ_CALCO.medidas.forEach((m,i)=>filasCal.push([m+"cm",...MATRIZ_CALCO.precios[i]]));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(filasC), "Config");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(filasCal), "Calcomanías");
  const fecha = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `CreatiBox_Respaldo_${fecha}.xlsx`);
  toast("Excel descargado 📄");
}

/* ============ SEED (primera vez) ============ */
async function sembrarSiVacio(){
  try {
    const snap = await getDocs(collection(db,"productos"));
    if(!snap.empty) return;
    if(!confirm("El catálogo está vacío. ¿Cargar el catálogo inicial de CreatiBox (Tabla Maestra 2026)?")) return;
    const batch = writeBatch(db);
    SEED_PRODUCTOS.forEach(p=>batch.set(doc(collection(db,"productos")),p));
    SEED_MATERIA.forEach(m=>batch.set(doc(collection(db,"materiaPrima")),{nombre:m[0],costoPaquete:m[1],rendimiento:m[2],costoUnitario:m[3],notas:m[4]||null}));
    batch.set(doc(db,"config","general"),SEED_CONFIG);
    await batch.commit();
    toast("Catálogo inicial cargado ✨");
  } catch(e){
    alert("No pude cargar el catálogo.\n\nCódigo: " + (e.code||"desconocido") + "\nDetalle: " + e.message + "\n\nMándale esta pantalla a Claude para arreglarlo.");
    console.error("SEED ERROR", e);
  }
}

/* ============ ARRANQUE Y SINCRONIZACIÓN ============ */
let subs = [];
function escuchar(){
  subs.forEach(u=>u()); subs = [];
  subs.push(onSnapshot(collection(db,"productos"), s=>{
    productos = s.docs.map(d=>({id:d.id,...d.data()}));
    const orden = {};
    SEED_PRODUCTOS.forEach((p,i)=>orden[p.cat+"|"+p.nombre]=i);
    productos.sort((a,b)=>(orden[a.cat+"|"+a.nombre]??999)-(orden[b.cat+"|"+b.nombre]??999)||a.nombre.localeCompare(b.nombre));
    if(!$("vCatalogo").classList.contains("oculto")) renderLista();
  }, e=>{ console.error("productos listener",e); toast("Error leyendo catálogo: "+(e.code||e.message)); }));
  subs.push(onSnapshot(collection(db,"materiaPrima"), s=>{ materia = s.docs.map(d=>({id:d.id,...d.data()})); }, e=>console.error("materia listener",e)));
  subs.push(onSnapshot(doc(db,"config","general"), s=>{ if(s.exists()) config = s.data(); if(!$("vCatalogo").classList.contains("oculto")) renderLista(); }));
}

onAuthStateChanged(auth, async user=>{
  $("cargando").classList.add("oculto");
  if(user){
    $("vLogin").classList.add("oculto");
    escuchar();
    await sembrarSiVacio();
    renderChips(); renderLista(); verVista("vCatalogo");
  } else {
    $("vLogin").classList.remove("oculto");
  }
});

$("btnLogin").onclick = async ()=>{
  $("loginErr").textContent = "";
  try { await signInWithEmailAndPassword(auth, $("loginEmail").value.trim(), $("loginPass").value); }
  catch(e){ $("loginErr").textContent = "Correo o contraseña incorrectos. Intenta de nuevo."; }
};
$("loginPass").addEventListener("keydown", e=>{ if(e.key==="Enter") $("btnLogin").click(); });
$("btnSalir").onclick = ()=>{ if(confirm("¿Cerrar sesión?")) signOut(auth); };
$("txtBuscar").addEventListener("input", e=>{ busqueda = e.target.value; renderLista(); });
$("fab").onclick = ()=>$("hoja").classList.add("abierta");
$("hoja").addEventListener("click", e=>{ if(e.target===$("hoja")) $("hoja").classList.remove("abierta"); });
window.addEventListener("unhandledrejection", e=>{ console.error("PROMESA",e.reason); toast("Error: "+(e.reason&&(e.reason.code||e.reason.message)||"desconocido")); });
document.querySelectorAll(".menu-item").forEach(b=>b.onclick = ()=>{
  $("hoja").classList.remove("abierta");
  const a = b.dataset.accion;
  if(a==="nuevoProducto") renderFormProd(null);
  else if(a==="materia") renderMateria();
  else if(a==="excel") exportarExcel();
  else if(a==="ajustes") renderAjustes();
});
</script>
